server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://identity-service
              predicates:
                - Path=/v1/auth/**

            - id: operators-admin
              uri: lb://operator-service
              predicates:
                - Path=/v1/operators/**

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/public.pem
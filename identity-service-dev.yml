spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vointika_identity_dev
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update            # auto-update schema locally — never in prod
    show-sql: true                # see every query in dev

jwt:
  secret: dev-secret-key-not-for-production-use-only-local

logging:
  level:
    com.vointika: DEBUG
    org.springframework.security: DEBUG   # see auth decisions in dev